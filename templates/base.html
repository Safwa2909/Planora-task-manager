<!DOCTYPE html>
<html>
<head>
    <title>Planora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <h1 class="brand">Planora</h1>
        {% if current_user.is_authenticated %}
            <span class="nav-sub">Dashboard</span>
        {% else %}
            <span class="nav-sub">Welcome</span>
        {% endif %}
    </div>

    <div class="nav-right">
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('logout') }}" class="nav-btn">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="nav-btn">Login</a>
            <a href="{{ url_for('register') }}" class="nav-btn outline">Register</a>
        {% endif %}
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
